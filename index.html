<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie clicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game">
        <h1 id="title">Cookie clicker</h1>
        <label id="Number">0</label>
        <div id="cookie-container">
            <img id="cookie" src="images/cookie.png">
        </div>
        <label id="auto_cps">0</label>
        <label id="click_power">0</label>
    </div>
    <div id="upgrades">
        <label id="cost">0</label>
        <label id="auto_cost">0</label>
        <button id="upgrade">Upgrade</button>
        <button id="upgrade_max">MAX Upgrade</button>
        <button id="auto">+1 Autoclick</button>
        <button id="auto-max">+MAX Autoclick</button>
        <button id="reset">Reset</button>
    </div>
</body>
<script src="script.js"></script>
</html>
